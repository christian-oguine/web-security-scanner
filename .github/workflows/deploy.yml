name: Deploy Web Security Scanner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Deploy app
        run: |
          cd /var/www/web-security-scanner
          git pull origin main
          npm install
          sudo docker compose up -d
          npm run build
          pm2 restart web-security-scanner --update-env || pm2 start npm --name web-security-scanner -- start
          pm2 save